<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STEP SOUL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:'Poppins', sans-serif;
background:#fde8ef;
}

/* MENU */

.menu{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#800020;
padding-top:30px;
text-align:center;
}

.menu img{width:130px;margin-bottom:30px;}

.menu a{
display:block;
padding:15px;
color:white;
text-decoration:none;
font-weight:500;
}

.menu a:hover{background:#a8324a;}

.contenido{margin-left:220px;}

/* HERO */

.hero{
height:400px;
background:#800020;
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* HISTORIA */

.historia{padding:80px 40px;background:#fff0f5;text-align:center;}

.historia h2{color:#800020;}

.historia p{max-width:700px;margin:auto;color:#4a0020;}

/* FRASE */

.frase{
background:#800020;
color:white;
padding:60px;
text-align:center;
}

/* AFIRMACIONES */

.afirmaciones{text-align:center;padding:80px 20px;}

.afirmaciones-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.afirmaciones-grid p{
background:#800020;
color:white;
padding:20px;
border-radius:20px;
cursor:pointer;
}

.afirmaciones-grid p:hover{
background:#f6c1d0;
color:#800020;
}

/* COMUNIDAD */

.comunidad{
padding:80px 20px;
text-align:center;
background:#fde8ef;
}

.comunidad h2{color:#800020;}

.input-area{
display:flex;
justify-content:center;
gap:10px;
margin:20px 0;
}

.input-area input{
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.input-area button{
background:#800020;
color:white;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
}

.muro{
max-width:600px;
margin:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.mensaje{
background:#fff0f5;
padding:15px;
border-radius:15px;
color:#800020;
}

/* PRODUCTOS */

.productos{text-align:center;padding:80px 20px;}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.producto{
background:#fff0f5;
padding:15px;
border-radius:15px;
}

.producto img{width:100%;height:250px;object-fit:cover;}

.btn{
background:#800020;
color:white;
padding:10px 20px;
border-radius:20px;
text-decoration:none;
display:inline-block;
margin-top:10px;
}

/* CONTACTO */

.contacto{text-align:center;padding:80px 20px;background:#fff0f5;}

.contacto h2{color:#800020;}

.contacto-btn{
background:#800020;
color:white;
padding:10px 20px;
border-radius:20px;
text-decoration:none;
margin:5px;
display:inline-block;
}

/* RESPONSIVE */

@media(max-width:768px){
.contenido{margin-left:0;}
.grid{grid-template-columns:1fr;}
.afirmaciones-grid{grid-template-columns:1fr;}
.menu{position:relative;width:100%;}
}

</style>
</head>

<body>

<div class="menu">
<img src="SOUL.png">
<a href="#">Inicio</a>
<a href="#productos">Productos</a>
<a href="#contacto">Contacto</a>
</div>

<div class="contenido">

<section class="hero">
<h1>STEP SOUL</h1>
</section>

<section class="historia">
<h2>STEP SOUL</h2>
<p>Inspirar, crecer y evolucionar 💖</p>
</section>

<section class="afirmaciones">
<h2>Afirmaciones ✨</h2>
<div class="afirmaciones-grid">
<p>💫 Soy fuerte</p>
<p>💖 Me elijo</p>
<p>🔥 Confío en mí</p>
</div>
</section>

<!-- 🔥 COMUNIDAD -->
<section class="comunidad">
<h2>Comunidad Step Soul 💖</h2>

<div class="input-area">
<input type="text" id="inputMensaje" placeholder="Hoy me siento...">
<button onclick="enviarMensaje()">Compartir</button>
</div>

<div id="muro" class="muro"></div>
</section>

<section class="productos" id="productos">
<h2>Productos</h2>

<div class="grid">
<div class="producto">
<img src="top-rosa.png">
<p>Top Pink ₡16 000</p>
<a href="https://wa.me/50660866716" class="btn">Comprar</a>
</div>
</div>

</section>

<section class="contacto" id="contacto">
<h2>Contacto</h2>
<a href="https://wa.me/50660866716" class="contacto-btn">WhatsApp</a>
</section>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLo0MMerclF7ZlobSYeMnYlOteAj0e0tQ",
  authDomain: "step-20a74.firebaseapp.com",
  projectId: "step-20a74",
  storageBucket: "step-20a74.firebasestorage.app",
  messagingSenderId: "916240679694",
  appId: "1:916240679694:web:8c81b11bebad9768d18d5f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const mensajesRef = collection(db, "mensajes");

window.enviarMensaje = async function(){
let input = document.getElementById("inputMensaje");
let texto = input.value;

if(texto.trim() === "") return;

await addDoc(mensajesRef, {
  texto: texto,
  fecha: Date.now()
});

input.value = "";
}

const q = query(mensajesRef, orderBy("fecha", "desc"));

onSnapshot(q, (snapshot) => {
let muro = document.getElementById("muro");
muro.innerHTML = "";

snapshot.forEach(doc => {
let div = document.createElement("div");
div.className = "mensaje";
div.textContent = doc.data().texto;
muro.appendChild(div);
});
});

</script>

</body>
</html>
