<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>STep FIT</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #800020; /* Rojo vino */
    color: white;
}

/* Sidebar */
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 230px;
    height: 100%;
    background-color: #5a0016;
    padding-top: 20px;
    box-shadow: 2px 0 15px rgba(0,0,0,0.3);
}

/* LOGO */
.logo {
    text-align: center;
    margin-bottom: 30px;
}

.logo img {
    width: 160px;
}

/* Links */
.sidebar a {
    display: block;
    padding: 15px 20px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.sidebar a:hover {
    background-color: #800020;
    padding-left: 25px;
}

/* Content */
.content {
    margin-left: 250px;
    padding: 40px;
}

/* Cards */
.card {
    background: white;
    color: #800020;
    padding: 20px;
    margin: 20px 0;
    width: 300px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

button {
    background-color: #800020;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
}

button:hover {
    background-color: #a0002a;
}
</style>
</head>

<body>

<div class="sidebar">

    <!-- LOGO AQUI -->
    <div class="logo">
        <img src="logo.png" alt="STep FIT Logo">
    </div>

    <a href="#">Inicio</a>
    <a href="#">Productos</a>
    <a href="#">Nosotras</a>
    <a href="#">Contacto</a>

</div>

<div class="content">
    <h1>Bienvenida a STep FIT ✨</h1>
    <p>Ropa deportiva femenina elegante y poderosa.</p>

    <div class="card">
        <h3>Legging Glow Sculpt</h3>
        <p>₡18,000</p>
        <button>Comprar</button>
    </div>

    <div class="card">
        <h3>Top Soft Energy</h3>
        <p>₡12,000</p>
        <button>Comprar</button>
    </div>
</div>

</body>
</html>
