<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>STep FIT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f5f5f5;
        }

        header {
            background-color: #800020; /* rojo vino */
            padding: 20px;
            text-align: center;
        }

        .logo img {
            width: 180px;
        }

        .hero {
            background-color: #800020;
            color: white;
            text-align: center;
            padding: 80px 20px;
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            background-color: white;
            color: #800020;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #ddd;
        }

        .productos {
            padding: 60px 20px;
            text-align: center;
        }

        .productos h2 {
            margin-bottom: 40px;
            color: #800020;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 250px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        footer {
            background-color: #800020;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="STep FIT Logo">
    </div>
</header>

<section class="hero">
    <h1>Ropa Deportiva Femenina</h1>
    <p>Elegancia, fuerza y confianza en cada movimiento</p>
    <a href="#" class="btn">Ver Colección</a>
</section>

<section class="productos">
    <h2>Nuestros Productos</h2>

    <div class="cards">
        <div class="card">
            <h3>Leggings Premium</h3>
            <p>Comodidad y ajuste perfecto.</p>
        </div>

        <div class="card">
            <h3>Tops Deportivos</h3>
            <p>Soporte y estilo moderno.</p>
        </div>

        <div class="card">
            <h3>Conjuntos Fitness</h3>
            <p>Diseños exclusivos STep FIT.</p>
        </div>
    </div>
</section>

<footer>
    © 2026 STep FIT | Todos los derechos reservados
</footer>

</body>
</html>
